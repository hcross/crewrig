name: MCP Security Check

on:
  pull_request:
    branches: [main]
    paths:
      - "**/package.json"
      - "**/settings.json"
      - "**/mcp.json"
      - "**/mcp.json.template"
      - "**/extension.json"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run security audit
        run: npm audit --audit-level=critical
